name: IMSDK UAT Compilation

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on:
      group: GHA-Framework-Stg-SelfHosted-RG
      labels: [self-hosted, framework-stg-u2404-x64-od-ephem]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run build
        env:
          SDK_URL: ${{ secrets.SDK_URL }}
        run: |
          chmod +x ci/build.sh
          ./ci/build.sh
